name: Post Scheduled Facebook Posts

on:
  schedule:
    # Chạy mỗi 30 phút để kiểm tra bài đến giờ đăng
    - cron: '*/30 * * * *'
  workflow_dispatch:    # Cho phép chạy thủ công từ GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # Tối đa 10 phút

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run post job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m src.main_post
