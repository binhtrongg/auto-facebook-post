name: Scrape & Schedule Facebook Posts

on:
  schedule:
    # Chạy lúc 05:00, 13:00, 21:00 giờ Việt Nam (UTC+7) = 22:00, 06:00, 14:00 UTC
    - cron: '0 22,6,14 * * *'
  workflow_dispatch:    # Cho phép chạy thủ công từ GitHub UI
    inputs:
      clear_dedup:
        description: 'Xóa dedup trước khi chạy (để đăng lại bài cũ)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Xóa dedup (nếu được yêu cầu)
        if: ${{ github.event.inputs.clear_dedup == 'true' }}
        env:
          DB_BACKEND: sheets
          GOOGLE_WEBAPP_URL: ${{ secrets.GOOGLE_WEBAPP_URL }}
          WEBAPP_SECRET: ${{ secrets.WEBAPP_SECRET }}
        run: |
          python -c "
          import os, httpx
          url = os.environ['GOOGLE_WEBAPP_URL']
          secret = os.environ['WEBAPP_SECRET']
          r = httpx.post(url, params={'token': secret}, json={'action': 'clear_dedup'}, follow_redirects=True, timeout=30)
          print('clear_dedup:', r.status_code, r.text[:200])
          r2 = httpx.post(url, params={'token': secret}, json={'action': 'clear_schedule'}, follow_redirects=True, timeout=30)
          print('clear_schedule:', r2.status_code, r2.text[:200])
          "

      - name: Run scrape job
        env:
          DB_BACKEND: sheets
          GOOGLE_WEBAPP_URL: ${{ secrets.GOOGLE_WEBAPP_URL }}
          WEBAPP_SECRET: ${{ secrets.WEBAPP_SECRET }}
          LOG_LEVEL: INFO
        run: python -m src.main_scrape
