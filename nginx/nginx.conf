# ============================================================
# Nginx config cho Admin Panel
# Dùng khi deploy lên homeserver với domain thật
# ============================================================

# ── HTTP → HTTPS redirect ───────────────────────────────
server {
    listen 80;
    server_name yourdomain.com;           # ← đổi thành domain của bạn

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tất cả HTTP sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com;           # ← đổi thành domain của bạn

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/yourdomain.com/privkey.pem;

    # Security headers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Proxy tới Streamlit
    location / {
        proxy_pass         http://admin:8501;
        proxy_http_version 1.1;

        # WebSocket (bắt buộc cho Streamlit hoạt động)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
    }
}
